# fly.toml app configuration file generated for kinetic-mcp on 2026-06-04T14:09:37-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'kinetic-mcp'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  KINETIC_API_URL = 'https://kinetic-api.fly.dev'
  MCP_TRANSPORT = 'streamable-http'
  PORT = '8080'

[[services]]
  protocol = 'tcp'
  internal_port = 8080
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'

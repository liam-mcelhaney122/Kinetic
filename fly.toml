# fly.toml app configuration file generated for kinetic-api on 2026-06-04T13:36:19-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'kinetic-api'
primary_region = 'iad'
kill_signal = 'SIGTERM'
kill_timeout = '5s'

[build]
  dockerfile = 'backend/Dockerfile'

[env]
  ENVIRONMENT = 'production'
  LOG_JSON = 'true'
  MONGO_DB = 'kinetic'

[[services]]
  protocol = 'tcp'
  internal_port = 8000
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 80

  [[services.http_checks]]
    interval = '15s'
    timeout = '3s'
    grace_period = '15s'
    method = 'GET'
    path = '/health'
    protocol = 'http'

  [[services.http_checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health/ready'
    protocol = 'http'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
